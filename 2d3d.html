<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 2D & 3D Demo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 🔹 Header -->
  <header class="header">
    <h1>CSS 2D & 3D Transform Demo</h1>
  </header>

  <!-- 🔹 2D Transform Section -->
  <section class="section">
    <h2>2D Transform</h2>

    <div class="row">
      <div class="box translate">Translate</div>
      <div class="box rotate">Rotate</div>
      <div class="box scale">Scale</div>
      <div class="box skew">Skew</div>
    </div>
  </section>

  <!-- 🔹 3D Transform Section -->
  <section class="section">
    <h2>3D Transform</h2>

    <div class="row">
      <div class="box3d rotateX">RotateX</div>
      <div class="box3d rotateY">RotateY</div>
      <div class="box3d rotateZ">RotateZ</div>
    </div>
  </section>

</body>
</html>
