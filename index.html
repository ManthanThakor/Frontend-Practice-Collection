<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Main Page</title>
  <link rel="stylesheet" href="style/style.css">
</head>

<body>

  <!-- 🔹 Navbar (Fixed Example) -->
  <header class="navbar">
    <h2>My Website - Fixed Example</h2>
  </header>

  <!-- 🔹 Main Content -->
  <main class="container">

    <!-- Section: Heading -->
    <section class="section">
      <h2>Main Web Page</h2>
    </section>

    <!-- 🔥 Sticky Section Added -->
    <section class="section">
      <h3 class="sticky-title">Sticky Section Title</h3>
      <p>Scroll inside this page to see sticky working.</p>
      <p style="height: 300px;"></p>
    </section>

    <!-- Section: Input -->
    <section class="section">
      <h3>Input Field</h3>
      <input type="text" placeholder="Enter your name">
    </section>

    <!-- Section: Iframe -->
    <section class="section">
      <h3>Iframe Example</h3>
      <iframe src="page2.html"></iframe>
    </section>

    <!-- Section: Table -->
    <section class="section">
      <h3>Table Example</h3>
      <table>
        <tr>
          <td>A</td>
          <td>B</td>
        </tr>
      </table>
    </section>

    <!-- Section: Margin Collapse -->
    <section class="section">
      <h3>Margin Collapse Example</h3>
      <div class="box1">Box 1</div>
      <div class="box2">Box 2</div>
    </section>

    <!-- Section: Position Relative -->
    <section class="section">
      <h3>Position Relative Example</h3>
      <div class="box3">Box 3</div>
      <div class="box4">Box 4 (moved)</div>
    </section>

  </main>

</body>
</html>
